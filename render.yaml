services:
  - type: web
    name: sports-picks
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -k gthread --threads 4 -b 0.0.0.0:$PORT src.picks.web:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: ODDS_API_KEY
        sync: false   # you set this in the Render dashboard, never in git
