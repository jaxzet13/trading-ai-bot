<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>BetLab AI</title>

  <!-- Exact same fonts as betlabai.app -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Chakra+Petch:wght@300;400;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ─────────────────────────────────────────────
       RESET & TOKENS
    ───────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #060a10;
      --gold:        #c9a227;
      --gold-light:  #f0c040;
      --gold-dark:   #a07810;
      --gold-dim:    rgba(201,162,39,0.18);
      --gold-glow:   rgba(201,162,39,0.35);
      --win:         #00d68f;
      --white:       #ffffff;
      --white-60:    rgba(255,255,255,0.60);
      --white-35:    rgba(255,255,255,0.35);
      --white-15:    rgba(255,255,255,0.15);
      --white-06:    rgba(255,255,255,0.06);

      --font-display: 'Barlow Condensed', sans-serif;
      --font-ui:      'Chakra Petch', sans-serif;
      --font-data:    'DM Mono', monospace;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* ─────────────────────────────────────────────
       OVERLAY — covers the full viewport
    ───────────────────────────────────────────── */
    #betlab-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      animation: loaderIn 0.35s ease both;
      --dismiss: 3.2s; /* total runtime before fade-out */
    }

    @keyframes loaderIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Auto-exit after --dismiss */
    #betlab-loader.exiting {
      animation: loaderOut 0.55s ease forwards;
      pointer-events: none;
    }

    @keyframes loaderOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* ─────────────────────────────────────────────
       CANVAS — particles & data streams
    ───────────────────────────────────────────── */
    #loader-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ─────────────────────────────────────────────
       GRID OVERLAY
    ───────────────────────────────────────────── */
    .loader-grid {
      position: absolute;
      inset: 0;
      z-index: 1;
      background-image:
        linear-gradient(var(--white-06) 1px, transparent 1px),
        linear-gradient(90deg, var(--white-06) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
      opacity: 0;
      animation: gridAppear 0.8s ease 0.15s forwards;
    }

    @keyframes gridAppear {
      to { opacity: 1; }
    }

    /* ─────────────────────────────────────────────
       VIGNETTE
    ───────────────────────────────────────────── */
    .loader-vignette {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: radial-gradient(ellipse 90% 90% at 50% 50%,
        transparent 30%,
        rgba(6,10,16,0.7) 70%,
        rgba(6,10,16,0.95) 100%);
      pointer-events: none;
    }

    /* ─────────────────────────────────────────────
       CORNER BRACKETS (HUD style)
    ───────────────────────────────────────────── */
    .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      z-index: 10;
      opacity: 0;
      animation: cornerIn 0.4s ease 0.5s forwards;
    }
    .corner-tl { top: clamp(12px,3vw,24px); left:  clamp(12px,3vw,24px); border-top:  1.5px solid var(--gold); border-left:  1.5px solid var(--gold); }
    .corner-tr { top: clamp(12px,3vw,24px); right: clamp(12px,3vw,24px); border-top:  1.5px solid var(--gold); border-right: 1.5px solid var(--gold); }
    .corner-bl { bottom: clamp(12px,3vw,24px); left:  clamp(12px,3vw,24px); border-bottom: 1.5px solid var(--gold); border-left:  1.5px solid var(--gold); }
    .corner-br { bottom: clamp(12px,3vw,24px); right: clamp(12px,3vw,24px); border-bottom: 1.5px solid var(--gold); border-right: 1.5px solid var(--gold); }

    @keyframes cornerIn {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 0.55; transform: scale(1); }
    }

    /* ─────────────────────────────────────────────
       CENTER CONTENT STACK
    ───────────────────────────────────────────── */
    .loader-center {
      position: relative;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(10px, 2.5vw, 20px);
      text-align: center;
      padding: 0 24px;
    }

    /* ─────────────────────────────────────────────
       DIAMOND LOGO
    ───────────────────────────────────────────── */
    .logo-wrap {
      position: relative;
      width: clamp(72px, 14vw, 110px);
      height: clamp(72px, 14vw, 110px);
      margin-bottom: clamp(4px, 1.5vw, 12px);
    }

    /* Outer glow ring */
    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -20%;
      border-radius: 50%;
      background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
      opacity: 0;
      animation: glowPulse 2s ease 0.8s infinite alternate;
    }

    @keyframes glowPulse {
      from { opacity: 0.4; transform: scale(0.9); }
      to   { opacity: 1;   transform: scale(1.1); }
    }

    .logo-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Diamond outline draw animation */
    .diamond-path {
      stroke-dasharray: 340;
      stroke-dashoffset: 340;
      animation: drawDiamond 0.9s cubic-bezier(0.4,0,0.2,1) 0.2s forwards;
    }

    @keyframes drawDiamond {
      to { stroke-dashoffset: 0; }
    }

    /* Diamond fill fades in after draw */
    .diamond-fill {
      opacity: 0;
      animation: fillIn 0.5s ease 0.9s forwards;
    }

    @keyframes fillIn {
      to { opacity: 1; }
    }

    /* Interior shine shimmer */
    .diamond-shine {
      opacity: 0;
      animation: shineIn 0.4s ease 1.1s forwards;
    }

    @keyframes shineIn {
      to { opacity: 0.3; }
    }

    /* ─────────────────────────────────────────────
       BRAND NAME
    ───────────────────────────────────────────── */
    .brand-name {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(38px, 9vw, 72px);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--white);
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(18px);
      animation: textUp 0.55s cubic-bezier(0.2,0,0.1,1) 1.05s forwards;
    }

    .brand-name .gold { color: var(--gold-light); }

    @keyframes textUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─────────────────────────────────────────────
       TAGLINE
    ───────────────────────────────────────────── */
    .tagline {
      font-family: var(--font-ui);
      font-weight: 300;
      font-size: clamp(10px, 2.2vw, 14px);
      letter-spacing: clamp(2px, 0.5vw, 5px);
      text-transform: uppercase;
      color: var(--white-35);
      opacity: 0;
      animation: fadeIn 0.5s ease 1.55s forwards;
    }

    /* ─────────────────────────────────────────────
       STATUS LINE
    ───────────────────────────────────────────── */
    .status-line {
      font-family: var(--font-data);
      font-weight: 300;
      font-size: clamp(10px, 1.8vw, 12px);
      color: var(--gold);
      letter-spacing: 1px;
      opacity: 0;
      min-height: 1.4em;
      animation: fadeIn 0.4s ease 2.0s forwards;
    }

    /* ─────────────────────────────────────────────
       PROGRESS BAR
    ───────────────────────────────────────────── */
    .progress-wrap {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      height: 2px;
      background: var(--white-06);
      opacity: 0;
      animation: fadeIn 0.3s ease 1.7s forwards;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
      box-shadow: 0 0 8px var(--gold), 0 0 16px rgba(201,162,39,0.4);
      animation: progressFill 1.4s cubic-bezier(0.4,0,0.2,1) 1.8s forwards;
    }

    @keyframes progressFill {
      0%   { width: 0%; }
      60%  { width: 72%; }
      85%  { width: 88%; }
      100% { width: 100%; }
    }

    /* ─────────────────────────────────────────────
       SKIP HINT
    ───────────────────────────────────────────── */
    .skip-hint {
      position: absolute;
      bottom: clamp(14px, 3vw, 28px);
      right: clamp(14px, 3vw, 28px);
      z-index: 20;
      font-family: var(--font-data);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--white-15);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 0.5s ease 2.5s forwards;
    }

    /* ─────────────────────────────────────────────
       HORIZONTAL RULE DIVIDER
    ───────────────────────────────────────────── */
    .loader-divider {
      width: clamp(60px, 12vw, 100px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      opacity: 0;
      animation: fadeIn 0.5s ease 1.35s forwards;
    }

    /* ─────────────────────────────────────────────
       SCANLINE SWEEP
    ───────────────────────────────────────────── */
    .scanline {
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,162,39,0.5), transparent);
      z-index: 15;
      top: 0;
      animation: scanMove 2.8s linear 0.2s 1 forwards;
      opacity: 0;
    }

    @keyframes scanMove {
      0%   { top: 0%;   opacity: 0; }
      5%   { opacity: 0.8; }
      95%  { opacity: 0.4; }
      100% { top: 100%; opacity: 0; }
    }

    /* ─────────────────────────────────────────────
       SHARED
    ───────────────────────────────────────────── */
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>

<div id="betlab-loader">

  <!-- Particle canvas -->
  <canvas id="loader-canvas"></canvas>

  <!-- Grid -->
  <div class="loader-grid"></div>

  <!-- Scan sweep -->
  <div class="scanline"></div>

  <!-- Vignette -->
  <div class="loader-vignette"></div>

  <!-- Corner brackets -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Center brand stack -->
  <div class="loader-center">

    <!-- Diamond logo -->
    <div class="logo-wrap">
      <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg-fill" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#f0c040"/>
            <stop offset="50%"  stop-color="#c9a227"/>
            <stop offset="100%" stop-color="#a07810"/>
          </linearGradient>
          <linearGradient id="lg-shine" x1="0%" y1="0%" x2="50%" y2="50%">
            <stop offset="0%"   stop-color="rgba(255,255,255,0.5)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </linearGradient>
          <filter id="glow-filter" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- BG rect -->
        <rect width="100" height="100" rx="18" fill="#060a10"/>

        <!-- Diamond fill (fades in after draw) -->
        <polygon class="diamond-fill"
          points="50,8 92,50 50,92 8,50"
          fill="url(#lg-fill)"
          filter="url(#glow-filter)"/>

        <!-- Diamond outline draw -->
        <polygon class="diamond-path"
          points="50,8 92,50 50,92 8,50"
          fill="none"
          stroke="url(#lg-fill)"
          stroke-width="2"
          stroke-linejoin="round"/>

        <!-- Interior cross-hair -->
        <line class="diamond-shine" x1="50" y1="8"  x2="50" y2="92" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
        <line class="diamond-shine" x1="8"  y1="50" x2="92" y2="50" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>

        <!-- Inner diamond outline -->
        <polygon class="diamond-shine"
          points="50,15 85,50 50,85 15,50"
          fill="none"
          stroke="rgba(255,255,255,0.1)"
          stroke-width="0.5"/>

        <!-- Shine overlay -->
        <polygon class="diamond-shine"
          points="50,8 92,50 50,50"
          fill="url(#lg-shine)"
          opacity="0.35"/>
      </svg>
    </div>

    <!-- Brand name -->
    <div class="brand-name">Bet<span class="gold">Lab</span> AI</div>

    <!-- Divider -->
    <div class="loader-divider"></div>

    <!-- Tagline -->
    <div class="tagline">Autonomous Sports Betting Intelligence</div>

    <!-- Status text -->
    <div class="status-line" id="status-text">Initializing model</div>

  </div>

  <!-- Progress bar -->
  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>

  <!-- Skip hint -->
  <div class="skip-hint">Tap to skip</div>

</div>

<script>
(function () {

  // ── Particle canvas ─────────────────────────────────────────
  const canvas = document.getElementById('loader-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', () => { resize(); buildParticles(); });

  // Gold palette only — matches BetLab brand
  const GOLD_COLORS = [
    'rgba(201,162,39,',   // #c9a227
    'rgba(240,192,64,',   // #f0c040
    'rgba(160,120,16,',   // #a07810
    'rgba(245,158,11,',   // amber
    'rgba(255,255,255,',  // white sparks
  ];

  class Particle {
    constructor(initial) { this.reset(initial ?? true); }
    reset(initial) {
      this.x     = Math.random() * W;
      this.y     = initial ? Math.random() * H : H + 6;
      this.r     = Math.random() * 1.4 + 0.3;
      this.vy    = -(Math.random() * 0.5 + 0.2);
      this.vx    = (Math.random() - 0.5) * 0.2;
      this.alpha = Math.random() * 0.5 + 0.08;
      this.base  = GOLD_COLORS[Math.floor(Math.random() * GOLD_COLORS.length)];
    }
    update() {
      this.y += this.vy;
      this.x += this.vx;
      if (this.y < -8) this.reset(false);
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.alpha;
      ctx.fillStyle   = this.base + '1)';
      ctx.shadowBlur  = 5;
      ctx.shadowColor = this.base + '0.8)';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  class DataStream {
    constructor() { this.reset(); }
    reset() {
      this.x     = Math.random() * W;
      this.y     = Math.random() * -200 - 10;
      this.len   = Math.random() * 80 + 30;
      this.speed = Math.random() * 2.5 + 1;
      this.alpha = Math.random() * 0.18 + 0.03;
      this.hue   = Math.random() > 0.6 ? '#f0c040' : '#c9a227';
    }
    update() {
      this.y += this.speed;
      if (this.y > H + this.len) this.reset();
    }
    draw() {
      const grad = ctx.createLinearGradient(this.x, this.y - this.len, this.x, this.y);
      grad.addColorStop(0, 'transparent');
      grad.addColorStop(1, this.hue);
      ctx.save();
      ctx.globalAlpha = this.alpha;
      ctx.strokeStyle = grad;
      ctx.lineWidth   = 0.8;
      ctx.beginPath();
      ctx.moveTo(this.x, this.y - this.len);
      ctx.lineTo(this.x, this.y);
      ctx.stroke();
      ctx.restore();
    }
  }

  let particles = [], streams = [];

  function buildParticles() {
    const count = Math.min(180, Math.floor((W * H) / 8000));
    particles = Array.from({ length: count }, () => new Particle(true));
    streams   = Array.from({ length: 22  }, () => new DataStream());
  }
  buildParticles();

  let rafId;
  function loop() {
    ctx.clearRect(0, 0, W, H);
    streams.forEach(s => { s.update(); s.draw(); });
    particles.forEach(p => { p.update(); p.draw(); });
    rafId = requestAnimationFrame(loop);
  }
  loop();

  // ── Status text cycling ─────────────────────────────────────
  const statusEl = document.getElementById('status-text');
  const statusMessages = [
    'Initializing model',
    'Loading AI weights',
    'Fetching today\'s picks',
    'Ready',
  ];
  let msgIdx = 0;
  let dotCount = 0;

  function updateStatus() {
    if (msgIdx >= statusMessages.length) return;
    const msg = statusMessages[msgIdx];
    if (msg === 'Ready') {
      statusEl.style.color = 'var(--win)';
      statusEl.textContent = '✓  System ready';
      return;
    }
    dotCount = (dotCount + 1) % 4;
    statusEl.textContent = msg + '.'.repeat(dotCount);
  }

  // Start cycling at 2.0s (matches statusLine fadeIn delay)
  setTimeout(() => {
    const interval = setInterval(() => {
      dotCount++;
      if (dotCount > 3) {
        dotCount = 0;
        msgIdx++;
        if (msgIdx >= statusMessages.length) {
          clearInterval(interval);
          if (msgIdx === statusMessages.length - 1 || true) {
            statusEl.style.color = 'var(--win, #00d68f)';
            statusEl.textContent = '✓  System ready';
          }
          return;
        }
      }
      const msg = statusMessages[msgIdx];
      statusEl.textContent = msg + '.'.repeat(dotCount);
    }, 260);
  }, 2000);

  // ── Dismiss / skip logic ────────────────────────────────────
  const loader = document.getElementById('betlab-loader');

  function dismiss() {
    if (loader.classList.contains('exiting')) return;
    cancelAnimationFrame(rafId);
    loader.classList.add('exiting');
    loader.addEventListener('animationend', () => {
      loader.remove();
      // Dispatch event so host app knows loading is done
      document.dispatchEvent(new CustomEvent('betlab:loaded'));
    }, { once: true });
  }

  // Auto-dismiss after ~3.2s
  const AUTO_DISMISS = 3200;
  let dismissTimer = setTimeout(dismiss, AUTO_DISMISS);

  // Allow tap/click to skip after 2s
  setTimeout(() => {
    loader.addEventListener('click', () => {
      clearTimeout(dismissTimer);
      dismiss();
    }, { once: true });
  }, 2000);

})();
</script>

</body>
</html>
